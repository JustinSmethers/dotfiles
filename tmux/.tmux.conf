# Remap ctrl-b -> ctrl-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Keep enough scrollback for long command output and logs.
set -g history-limit 100000

# Let tmux cooperate with terminal clipboard integrations where supported.
set -g set-clipboard on

# Enable mouse control
set -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M
bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M
bind -T copy-mode-vi    C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-vi    C-WheelDownPane send-keys -X halfpage-down
bind -T copy-mode-emacs C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-emacs C-WheelDownPane send-keys -X halfpage-down

# Use vim keybindings in copy mode.
setw -g mode-keys vi

# Move between panes with prefix + vim directions.
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize panes with prefix + shifted vim directions.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vi-style copy mode: prefix + [, v to select, y to copy, Escape to cancel.
unbind -T copy-mode-vi Enter
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi Escape send-keys -X cancel
if-shell 'command -v pbcopy >/dev/null 2>&1' 'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"; bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"; bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"' 'bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel; bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel; bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel'
